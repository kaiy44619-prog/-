<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排檔表管理系統 v2.0 - 岳笙專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        danger: '#F53F3F',
                        warning: '#FF7D00',
                        dark: '#1D2129'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-hover { @apply transition-all duration-300 hover:shadow-lg active:scale-95; }
            .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
            .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-dark">
    <div id="app" class="container mx-auto px-4 py-6 max-w-6xl">
        
        <!-- 登入頁面 -->
        <div id="loginPage" class="flex items-center justify-center min-h-[80vh]">
            <div class="bg-white rounded-2xl card-shadow p-8 w-full max-w-md animate-fade-in">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-dark mb-2"><i class="fa fa-calendar-check-o text-primary mr-2"></i>排檔表系統</h1>
                    <p class="text-gray-500 text-sm">工時管理與打卡審核</p>
                </div>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
                        <input type="text" id="loginUsername" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none" placeholder="預設：admin" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                        <input type="password" id="loginPassword" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none" placeholder="預設：admin123" required>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-medium btn-hover flex items-center justify-center">
                        <i class="fa fa-sign-in mr-2"></i>登入系統
                    </button>
                </form>
            </div>
        </div>

        <!-- 主系統 -->
        <div id="mainPage" class="hidden animate-fade-in">
            <!-- 頂部欄 -->
            <header class="bg-white rounded-xl card-shadow p-4 mb-6 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl font-bold"><i class="fa fa-calendar text-primary mr-2"></i>管理中心</h1>
                    <span id="currentTime" class="hidden md:inline text-gray-500 text-xs bg-gray-100 px-3 py-1 rounded-full"></span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="userInfo" class="text-sm font-bold flex items-center gap-2"></div>
                    <button id="logoutBtn" class="text-gray-400 hover:text-danger p-2"><i class="fa fa-power-off text-lg"></i></button>
                </div>
            </header>

            <!-- 導航功能切換 -->
            <nav class="flex bg-white rounded-xl card-shadow mb-6 overflow-hidden">
                <button class="flex-1 py-4 text-sm font-bold border-b-2 border-primary text-primary tab-btn" data-target="dashboard">儀表板</button>
                <button class="flex-1 py-4 text-sm font-medium text-gray-500 tab-btn" data-target="checkin">打卡回報</button>
                <button id="adminTabBtn" class="flex-1 py-4 text-sm font-medium text-gray-500 tab-btn hidden" data-target="admin">審核後台</button>
            </nav>

            <!-- 頁面內容 -->
            <main>
                <!-- 儀表板區域 -->
                <section id="dashboard" class="tab-content animate-fade-in">
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="bg-white p-5 rounded-xl card-shadow border-l-4 border-primary">
                            <p class="text-xs text-gray-500 mb-1">本月通過工時</p>
                            <p id="statHours" class="text-2xl font-bold text-primary">0h 0m</p>
                        </div>
                        <div class="bg-white p-5 rounded-xl card-shadow border-l-4 border-warning">
                            <p class="text-xs text-gray-500 mb-1">等待審核</p>
                            <p id="statPending" class="text-2xl font-bold text-warning">0</p>
                        </div>
                        <div class="bg-white p-5 rounded-xl card-shadow border-l-4 border-success">
                            <p class="text-xs text-gray-500 mb-1">今日狀態</p>
                            <p id="todayStatus" class="text-lg font-bold text-success">尚未打卡</p>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl card-shadow">
                        <h3 class="font-bold mb-4 text-gray-700">最近 5 筆記錄</h3>
                        <div id="recentList" class="space-y-3 text-sm text-gray-600">
                            <!-- JS 動態生成 -->
                        </div>
                    </div>
                </section>

                <!-- 打卡區域 -->
                <section id="checkin" class="tab-content hidden animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- 上班 -->
                        <div class="bg-white p-6 rounded-xl card-shadow text-center">
                            <div class="w-16 h-16 bg-success/10 text-success rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa fa-sign-in text-2xl"></i>
                            </div>
                            <h3 class="font-bold text-lg mb-2">上班打卡</h3>
                            <p class="text-xs text-gray-400 mb-4">開放時段：每小時 00 - 03 分</p>
                            <input type="file" id="ciFile" accept="image/*" class="hidden">
                            <button onclick="document.getElementById('ciFile').click()" class="mb-4 text-primary text-sm font-medium">選擇截圖</button>
                            <button id="checkinBtn" class="w-full py-4 rounded-xl font-bold text-white bg-gray-300 cursor-not-allowed">等待中...</button>
                        </div>
                        <!-- 下班 -->
                        <div class="bg-white p-6 rounded-xl card-shadow text-center">
                            <div class="w-16 h-16 bg-danger/10 text-danger rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa fa-sign-out text-2xl"></i>
                            </div>
                            <h3 class="font-bold text-lg mb-2">下班打卡</h3>
                            <p class="text-xs text-gray-400 mb-4">開放時段：每小時 58 - 00 分</p>
                            <input type="file" id="coFile" accept="image/*" class="hidden">
                            <button onclick="document.getElementById('coFile').click()" class="mb-4 text-danger text-sm font-medium">選擇截圖</button>
                            <button id="checkoutBtn" class="w-full py-4 rounded-xl font-bold text-white bg-gray-300 cursor-not-allowed">等待中...</button>
                        </div>
                    </div>
                </section>

                <!-- 管理審核區域 -->
                <section id="admin" class="tab-content hidden animate-fade-in">
                    <div class="bg-white p-6 rounded-xl card-shadow">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold text-lg">待審核清單</h3>
                            <button id="refreshAdmin" class="text-primary text-sm"><i class="fa fa-refresh mr-1"></i>重整</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-gray-50 text-gray-500 uppercase">
                                    <tr>
                                        <th class="px-4 py-3">員工</th>
                                        <th class="px-4 py-3">類型</th>
                                        <th class="px-4 py-3">時間</th>
                                        <th class="px-4 py-3">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="adminTableBody">
                                    <!-- 動態生成 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Toast -->
    <div id="toastContainer" class="fixed top-5 right-5 z-[100] space-y-3"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // === 資料庫安全初始化 (Single Source of Truth) ===
            const db = {
                getUsers: () => JSON.parse(localStorage.getItem('users')) || [],
                getCheckins: () => JSON.parse(localStorage.getItem('checkins')) || [],
                saveCheckin: (data) => {
                    const list = db.getCheckins();
                    list.push({ ...data, id: 'rec_' + Date.now(), status: 'pending', created
