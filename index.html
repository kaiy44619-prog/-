<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排檔表管理系統 v2.1 - 岳笙專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF', success: '#00B42A', danger: '#F53F3F', warning: '#FF7D00', dark: '#1D2129'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-hover { @apply transition-all duration-300 hover:shadow-lg active:scale-95; }
            .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
            .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-dark">
    <div id="app" class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- 登入頁面 -->
        <div id="loginPage" class="flex items-center justify-center min-h-[80vh]">
            <div class="bg-white rounded-2xl card-shadow p-8 w-full max-w-md animate-fade-in">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-dark mb-2"><i class="fa fa-calendar-check-o text-primary mr-2"></i>排檔表系統</h1>
                    <p class="text-gray-500 text-sm">工時管理與打卡審核</p>
                </div>
                <!-- 修正重點：添加 onsubmit="return false;" 防止頁面跳轉 -->
                <form id="loginForm" onsubmit="return false;" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
                        <input type="text" id="loginUsername" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none" placeholder="admin" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                        <input type="password" id="loginPassword" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none" placeholder="admin123" required>
                    </div>
                    <button id="loginBtn" type="button" class="w-full bg-primary text-white py-3 rounded-lg font-medium btn-hover flex items-center justify-center">
                        <i class="fa fa-sign-in mr-2"></i>登入系統
                    </button>
                </form>
            </div>
        </div>

        <!-- 主系統 (其餘代碼保持不變，已優化) -->
        <div id="mainPage" class="hidden animate-fade-in">
            <header class="bg-white rounded-xl card-shadow p-4 mb-6 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl font-bold text-primary"><i class="fa fa-calendar mr-2"></i>管理中心</h1>
                    <span id="currentTime" class="hidden md:inline text-gray-500 text-xs bg-gray-100 px-3 py-1 rounded-full"></span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="userInfo" class="text-sm font-bold flex items-center gap-2"></div>
                    <button id="logoutBtn" class="text-gray-400 hover:text-danger p-2"><i class="fa fa-power-off text-lg"></i></button>
                </div>
            </header>
            <nav class="flex bg-white rounded-xl card-shadow mb-6 overflow-hidden">
                <button class="flex-1 py-4 text-sm font-bold border-b-2 border-primary text-primary tab-btn" data-target="dashboard">儀表板</button>
                <button class="flex-1 py-4 text-sm font-medium text-gray-500 tab-btn" data-target="checkin">打卡回報</button>
                <button id="adminTabBtn" class="flex-1 py-4 text-sm font-medium text-gray-500 tab-btn hidden" data-target="admin">審核後台</button>
            </nav>
            <main>
                <section id="dashboard" class="tab-content animate-fade-in">
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="bg-white p-5 rounded-xl card-shadow border-l-4 border-primary">
                            <p class="text-xs text-gray-500 mb-1">本月通過工時</p>
                            <p id="statHours" class="text-2xl font-bold text-primary">0h 0m</p>
                        </div>
                        <div class="bg-white p-5 rounded-xl card-shadow border-l-4 border-warning">
                            <p class="text-xs text-gray-500 mb-1">等待審核</p>
                            <p id="statPending" class="text-2xl font-bold text-warning">0</p>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl card-shadow">
                        <h3 class="font-bold mb-4 text-gray-700">最近 5 筆記錄</h3>
                        <div id="recentList" class="space-y-2 text-sm text-gray-600"></div>
                    </div>
                </section>
                <section id="checkin" class="tab-content hidden animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-center">
                        <div class="bg-white p-8 rounded-xl card-shadow">
                            <h3 class="font-bold text-lg mb-4 text-success">上班打卡</h3>
                            <button id="checkinBtn" class="w-full py-4 rounded-xl font-bold text-white bg-gray-300">時段未開放</button>
                        </div>
                        <div class="bg-white p-8 rounded-xl card-shadow">
                            <h3 class="font-bold text-lg mb-4 text-danger">下班打卡</h3>
                            <button id="checkoutBtn" class="w-full py-4 rounded-xl font-bold text-white bg-gray-300">時段未開放</button>
                        </div>
                    </div>
                </section>
                <section id="admin" class="tab-content hidden animate-fade-in">
                    <div class="bg-white p-6 rounded-xl card-shadow">
                        <h3 class="font-bold text-lg mb-4">待審核清單</h3>
                        <tbody id="adminTableBody"></tbody>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <div id="toastContainer" class="fixed top-5 right-5 z-[100] space-y-3"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = {
                getUsers: () => JSON.parse(localStorage.getItem('users')) || [{id:'1', username:'admin', password:'admin123', nickname:'管理員', role:'admin'}],
                getCheckins: () => JSON.parse(localStorage.getItem('checkins')) || [],
                saveCheckin: (data) => {
                    const list = JSON.parse(localStorage.getItem('checkins')) || [];
                    list.push({ ...data, id: 'rec_' + Date.now(), status: 'pending' });
                    localStorage.setItem('checkins', JSON.stringify(list));
                }
            };

            let currentUser = null;

            // 修正：直接針對按鈕點擊處理，防止 Form 預設行為
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.onclick = () => {
                const u = document.getElementById('loginUsername').value.trim();
                const p = document.getElementById('loginPassword').value;
                const users = db.getUsers();
                const user = users.find(x => x.username === u && x.password === p);

                if(user) {
                    currentUser = user;
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainPage').classList.remove('hidden');
                    document.getElementById('userInfo').innerHTML = `<span>${user.nickname}</span>`;
                    if(user.role === 'admin') document.getElementById('adminTabBtn').classList.remove('hidden');
                    startSystem();
                    updateDashboard();
                    showToast('登入成功', 'success');
                } else {
                    showToast('帳密錯誤', 'danger');
                }
            };

            function startSystem() {
                setInterval(() => {
                    const now = new Date();
                    const m = now.getMinutes();
                    document.getElementById('currentTime').innerText = now.toLocaleString();
                    toggleBtn('checkinBtn', m >= 0 && m <= 3, 'bg-success', '確認上班');
                    toggleBtn('checkoutBtn', m >= 58 && m <= 59, 'bg-danger', '確認下班');
                }, 1000);
            }

            function toggleBtn(id, active, color, text) {
                const btn = document.getElementById(id);
                if(active) {
                    btn.className = `w-full py-4 rounded-xl font-bold text-white btn-hover ${color}`;
                    btn.innerText = text;
                    btn.disabled = false;
                } else {
                    btn.className = `w-full py-4 rounded-xl font-bold text-white bg-gray-300 cursor-not-allowed`;
                    btn.innerText = '非時段';
                    btn.disabled = true;
                }
            }

            function updateDashboard() {
                const logs = db.getCheckins().filter(x => x.userId === currentUser.id);
                document.getElementById('statPending').innerText = logs.filter(x => x.status === 'pending').length;
                document.getElementById('statHours').innerText = logs.filter(x => x.status === 'approved').length + ' 筆';
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.className = "flex-1 py-4 text-sm font-medium text-gray-500 tab-btn");
                    btn.className = "flex-1 py-4 text-sm font-bold border-b-2 border-primary text-primary tab-btn";
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    document.getElementById(btn.dataset.target).classList.remove('hidden');
                };
            });

            function showToast(msg, type) {
                const t = document.createElement('div');
                t.className = `${type === 'success' ? 'bg-success' : 'bg-danger'} text-white px-6 py-3 rounded-xl shadow-xl animate-fade-in text-sm font-medium`;
                t.innerText = msg;
                document.getElementById('toastContainer').appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }

            document.getElementById('logoutBtn').onclick = () => location.reload();
        });
    </script>
</body>
</html>
