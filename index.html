<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岳笙團隊雲端系統</title>
    <!-- 使用相容版 SDK，確保穩定性 -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-md mx-auto px-4 py-10">
        <!-- 登入頁 -->
        <div id="authPage" class="bg-white p-8 rounded-3xl shadow-xl">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-600">岳笙團隊系統</h2>
            <div class="space-y-4">
                <input id="uAcc" type="text" placeholder="帳號 (jhjz01-30)" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <input id="uPwd" type="password" placeholder="密碼" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">登入系統</button>
            </div>
            <p class="text-center text-[10px] text-gray-400 mt-6 italic">Yuesheng Cloud v1.0</p>
        </div>

        <!-- 主頁面 -->
        <div id="mainPage" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h1 id="userHello" class="font-bold text-blue-600"></h1>
                <button onclick="location.reload()" class="text-gray-400 text-xs border px-3 py-1 rounded-full">登出</button>
            </div>
            
            <nav class="grid grid-cols-2 bg-white rounded-2xl shadow-sm mb-6 p-1 gap-1 text-sm text-center border">
                <button class="py-3 rounded-xl font-bold nav-btn bg-blue-600 text-white" data-target="schedule">預約排班</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="checkin">考勤打卡</button>
            </nav>

            <!-- 預約排班 -->
            <section id="schedule" class="tab-content bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-bold mb-4">申請排班</h3>
                <input type="date" id="dateInput" class="w-full p-3 border rounded-xl mb-4">
                <button id="addSchedBtn" class="w-full bg-blue-100 text-blue-600 py-3 rounded-xl font-bold">送出雲端預約</button>
            </section>

            <!-- 考勤打卡 -->
            <section id="checkin" class="tab-content hidden bg-white p-6 rounded-3xl shadow-sm border text-center">
                <p class="text-sm text-gray-500 mb-2">目前時間</p>
                <div id="timer" class="text-2xl font-mono font-bold mb-6 text-blue-600">00:00:00</div>
                <button id="checkBtn" class="w-full bg-green-500 text-white py-6 rounded-3xl font-bold text-xl shadow-lg">立即打卡</button>
                <p class="text-[10px] text-gray-400 mt-4">註：打卡將自動紀錄目前位置與時間</p>
            </section>
        </div>
    </div>

    <script>
        // --- 1. 使用您提供的新身分證 ---
        const firebaseConfig = {
          apiKey: "AIzaSyA39fdKxRtNh_-MfrhpzzqtOu1MV9VE7VM",
          authDomain: "yuesheng-system-56669.firebaseapp.com",
          databaseURL: "https://yuesheng-system-56669-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "yuesheng-system-56669",
          appId: "1:747414817349:web:ce06a488187dcf88ca712c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = null;
        const MASTER_USERS = {};
        for (let i = 1; i <= 30; i++) {
            let id = i < 10 ? '0' + i : i;
            MASTER_USERS[`jhjz${id}`] = { nick: `成員${id}` };
        }

        // --- 2. 登入邏輯 ---
        document.getElementById('loginBtn').onclick = () => {
            const acc = document.getElementById('uAcc').value.toLowerCase().trim();
            const pwd = document.getElementById('uPwd').value.trim();
            if(MASTER_USERS[acc] && pwd === '20260214') {
                user = { id: acc, nick: MASTER_USERS[acc].nick };
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                document.getElementById('userHello').innerText = "Hi, " + user.nick;
            } else { alert('帳密錯誤！'); }
        };

        // --- 3. 切換分頁 ---
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
                btn.classList.add('bg-blue-600', 'text-white');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(btn.dataset.target).classList.remove('hidden');
            };
        });

        // --- 4. 時鐘功能 ---
        setInterval(() => {
            document.getElementById('timer').innerText = new Date().toTimeString().split(' ')[0];
        }, 1000);

        // --- 5. 排班傳送雲端 ---
        document.getElementById('addSchedBtn').onclick = () => {
            const d = document.getElementById('dateInput').value;
            if(!d) return alert('請先選擇日期');
            db.ref('attendance_records').push({
                user: user.id,
                nick: user.nick,
                type: '預約排班',
                detail: d,
                timestamp: new Date().toLocaleString()
            }).then(() => alert('✅ 排班紀錄已同步至雲端！'));
        };

        // --- 6. 打卡傳送雲端 ---
        document.getElementById('checkBtn').onclick = () => {
            db.ref('attendance_records').push({
                user: user.id,
                nick: user.nick,
                type: '考勤打卡',
                detail: '✅ 準時打卡',
                timestamp: new Date().toLocaleString()
            }).then(() => alert('✅ 打卡成功！已存至雲端'));
        };
    </script>
</body>
</html>
