<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color=1.0, user-scalable=no">
    <title>金好家族管理系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .nav-btn.active { background-color: #2563eb; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .record-img { max-width: 100%; max-height: 300px; object-fit: contain; border-radius: 12px; margin-top: 8px; cursor: pointer; border: 1px solid #ddd; display: block; }
        .disabled-btn { background-color: #d1d5db !important; cursor: not-allowed !important; color: #9ca3af !important; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 antialiased">
    <div id="app" class="max-w-4xl mx-auto px-4 py-6">
        
        <div id="authPage" class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl mt-10 text-center">
            <h2 class="text-2xl font-bold mb-6 text-blue-600">金好家族系統</h2>
            <div id="loginForm" class="space-y-4 text-left">
                <input id="loginAcc" type="text" placeholder="帳號" class="w-full p-4 border rounded-2xl outline-none">
                <input id="loginPwd" type="password" placeholder="密碼" class="w-full p-4 border rounded-2xl outline-none">
                <button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">進入系統</button>
                <p class="text-center text-sm text-gray-400 mt-4 cursor-pointer" onclick="toggleAuth(true)">成員註冊申請</p>
            </div>
            <div id="regForm" class="hidden space-y-4 text-left">
                <p class="text-xs text-red-500 font-bold mb-2">註冊後請聯絡岳笙審核通過</p>
                <input id="regAcc" type="text" placeholder="設定登入帳號" class="w-full p-4 border rounded-2xl outline-none">
                <input id="regNick" type="text" placeholder="顯示暱稱" class="w-full p-4 border rounded-2xl outline-none">
                <input id="regPwd" type="password" placeholder="設定密碼" class="w-full p-4 border rounded-2xl outline-none">
                <button id="regBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">提交註冊申請</button>
                <p class="text-center text-sm text-gray-400 mt-4 cursor-pointer" onclick="toggleAuth(false)">返回登入</p>
            </div>
        </div>

        <div id="mainPage" class="hidden">
            <div class="flex justify-between items-center mb-4 px-2">
                <h1 class="text-xl font-bold text-blue-600">Hi, <span id="userHello"></span></h1>
                <button onclick="location.reload()" class="text-xs bg-gray-200 px-3 py-1 rounded text-gray-500">登出</button>
            </div>

            <nav id="mainNav" class="grid grid-cols-4 bg-white rounded-2xl shadow-sm mb-4 p-1 border text-sm">
                <button class="py-3 rounded-xl font-bold nav-btn active" data-target="schedule">預約</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="checkin">打卡</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="history">紀錄</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="profile">個人</button>
            </nav>

            <section id="schedule" class="tab-content active bg-white p-6 rounded-2xl border">
                <h3 class="font-bold mb-2 text-sm text-gray-700">1. 選擇預約日期 (僅限3天內)</h3>
                <input type="date" id="dateInput" class="w-full p-4 border rounded-xl mb-4 bg-gray-50 text-sm font-bold" onchange="updateTimeOptions()">
                
                <h3 class="font-bold mb-2 text-sm text-gray-700">2. 選擇排班時段 (每時段限4人)</h3>
                <select id="timeInput" class="w-full p-4 border rounded-xl mb-4 bg-gray-50 text-sm font-bold"></select>
                
                <button onclick="submitSchedule()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-md active:scale-95 transition mb-6">送出預約排班</button>
                
                <hr class="my-4">
                <h4 class="font-bold text-xs text-blue-600 mb-2"><i class="fa fa-calendar-check-o"></i> 您當天已預約的時段：</h4>
                <div id="myTodayScheduleList" class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-60 overflow-y-auto"></div>
            </section>

            <section id="checkin" class="tab-content bg-white p-6 rounded-2xl border text-center max-w-xl mx-auto">
                <div id="timeStatus" class="mb-4 p-3 rounded-xl text-xs font-bold bg-blue-50 text-blue-600">📌 提示：上下班分流時段，上班為00-03分;下班為58-00分</div>
                <div class="mb-4 text-left">
                    <label class="block w-full border-2 border-dashed border-gray-300 rounded-2xl p-6 cursor-pointer hover:bg-gray-50 transition text-center">
                        <i class="fa fa-camera text-3xl text-gray-300 mb-2"></i>
                        <span id="fileNameDisplay" class="block text-sm text-gray-500">點擊選取、拖曳或拍攝截圖</span>
                        <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="previewImage()">
                    </label>
                </div>
                <div id="checkinBtnContainer"></div>
            </section>

            <section id="history" class="tab-content bg-white p-4 rounded-2xl border min-h-[300px]">
                <div id="personalList" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </section>

            <section id="profile" class="tab-content bg-white p-6 rounded-2xl border text-center max-w-md mx-auto">
                <input id="newNick" type="text" class="w-full p-4 border rounded-xl mb-4 text-sm" placeholder="輸入新暱稱">
                <button onclick="doUpdateName()" class="w-full bg-black text-white py-4 rounded-xl font-bold">儲存修改</button>
            </section>

            <section id="admin" class="tab-content bg-white p-6 rounded-2xl border-2 border-red-500 shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-red-600 text-lg">家族管理後台</h3>
                    <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded font-bold">最高權限已載入</span>
                </div>
                
                <h4 class="font-bold text-sm mb-3 text-gray-600">數據報表匯出</h4>
                <button onclick="exportToExcel()" class="max-w-md bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg mb-6 flex justify-center items-center gap-2 active:scale-95 transition">
                    <i class="fa fa-file-excel-o"></i> 導出 45 天考勤試算表
                </button>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-1 space-y-6">
                        <div>
                            <h4 class="font-bold text-sm mb-3 text-gray-600">待審核申請</h4>
                            <div id="pendingList" class="space-y-2 bg-gray-50 p-2 rounded-xl border min-h-[60px]"></div>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm mb-3 text-gray-600">家族成員 (<span id="userCount">0</span>)</h4>
                            <div id="userList" class="space-y-2 max-h-64 overflow-y-auto bg-gray-50 p-2 rounded-xl border"></div>
                        </div>
                    </div>
                    
                    <div class="md:col-span-2">
                        <h4 class="font-bold text-sm mb-3 text-red-600"><i class="fa fa-exclamation-triangle"></i> 全體動態管理（可強制刪除排班）</h4>
                        <div id="adminAllList" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[600px] overflow-y-auto p-1"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA39fdKxRtNh_-MfrhpzzqtOu1MV9VE7VM",
          authDomain: "yuesheng-system-56669.firebaseapp.com",
          databaseURL: "https://yuesheng-system-56669-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "yuesheng-system-56669",
          appId: "1:747414817349:web:ce06a488187dcf88ca712c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let curUser = null;
        let globalRecords = [];

        function initDateRange() {
            const today = new Date();
            const day3 = new Date(Date.now() + 2 * 24 * 60 * 60 * 1000);
            const formatDate = (d) => d.toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
            
            const minStr = formatDate(today);
            const maxStr = formatDate(day3);
            
            const dateInput = document.getElementById('dateInput');
            dateInput.value = minStr;
            dateInput.min = minStr;
            dateInput.max = maxStr;
        }

        function checkTime() {
            const now = new Date();
            const m = now.getMinutes();
            const container = document.getElementById('checkinBtnContainer');
            if(!container) return;
            
            if (m === 0) {
                container.innerHTML = `<div class="grid grid-cols-2 gap-4"><button onclick="handleImageCheckin('上班打卡')" class="bg-green-500 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition">提交【上班】打卡</button><button onclick="handleImageCheckin('下班打卡')" class="bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition">提交【下班】打卡</button></div>`;
            } else if (m >= 1 && m <= 3) {
                container.innerHTML = `<button onclick="handleImageCheckin('上班打卡')" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition">提交【上班】截圖打卡</button>`;
            } else if (m >= 58 && m <= 59) {
                container.innerHTML = `<button onclick="handleImageCheckin('下班打卡')" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition">提交【下班】截圖打卡</button>`;
            } else {
                container.innerHTML = `<button class="w-full disabled-btn text-white py-4 rounded-xl font-bold shadow-md" disabled>非打卡時段 (開放時段：58分 ~ 03分)</button>`;
            }
        }
        setInterval(checkTime, 1000);

        window.toggleAuth = (isReg) => {
            document.getElementById('loginForm').classList.toggle('hidden', isReg);
            document.getElementById('regForm').classList.toggle('hidden', !isReg);
        };

        document.getElementById('loginBtn').onclick = () => {
            const acc = document.getElementById('loginAcc').value.trim().toLowerCase();
            const pwd = document.getElementById('loginPwd').value.trim();
            if(acc === 'admin' && pwd === '123') loginOk({ acc:'admin', nick:'岳笙', role:'admin' });
            else {
                db.ref('users/'+acc).once('value', snap => {
                    const d = snap.val();
                    if(d && d.pwd === pwd) loginOk({...d, role:'user'});
                    else alert('帳密錯誤或未核准');
                });
            }
        };

        document.getElementById('regBtn').onclick = () => {
            const acc = document.getElementById('regAcc').value.trim().toLowerCase();
            const nick = document.getElementById('regNick').value.trim();
            const pwd = document.getElementById('regPwd').value.trim();
            if(!acc || !nick || !pwd) return alert('請填寫完整');
            db.ref('pending_users/'+acc).set({ acc, nick, pwd, timestamp: Date.now() }).then(() => { alert('已提交！請聯絡岳笙審核。'); toggleAuth(false); });
        };

        function loginOk(u) {
            curUser = u;
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userHello').innerText = curUser.nick;
            
            if(curUser.role === 'admin') {
                const nav = document.getElementById('mainNav');
                nav.className = "grid grid-cols-5 bg-white rounded-2xl shadow-sm mb-4 p-1 border text-sm";
                nav.innerHTML += `<button class="py-3 rounded-xl font-bold nav-btn border border-red-100 text-red-600" data-target="admin"><i class="fa fa-cog"></i> 管理</button>`;
                bindNavEvents(); 
                loadAdminData(); loadUserList();
            }
            initDateRange();
            loadLogs(); checkTime();
        }

        window.previewImage = () => {
            const file = document.getElementById('imgInput').files[0];
            if(file) document.getElementById('fileNameDisplay').innerText = "已選取：" + file.name;
        };

        window.handleImageCheckin = (checkinType) => {
            const file = document.getElementById('imgInput').files[0];
            if(!file) return alert('請選取截圖');
            
            const reader = new FileReader();
            reader.onload = (e) => {
                sendRecord(checkinType, e.target.result);
                document.getElementById('imgInput').value = "";
                document.getElementById('fileNameDisplay').innerText = "點擊選取、拖曳或拍攝截圖";
                alert(`${checkinType}成功！`);
            };
            reader.readAsDataURL(file);
        };

        window.sendRecord = (type, detail) => {
            return db.ref('attendance_records').push({
                user: curUser.acc, nick: curUser.nick, type, detail,
                timestamp: Date.now(),
                time: new Date().toLocaleString('zh-TW', {hour12:false})
            });
        };

        function updateTimeOptions() {
            const selectedDate = document.getElementById('dateInput').value; 
            if(!selectedDate) return;

            // 核心修改：取得當前系統即時的「日期」與「小時」
            const now = new Date();
            const formatDate = (d) => d.toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
            const todayStr = formatDate(now);
            const currentHour = now.getHours();

            const scheduleCount = {};
            
            globalRecords.forEach(r => {
                if(r.type && r.type.includes('預約排班') && r.detail) {
                    const rawDetail = r.detail.trim();
                    if (rawDetail.startsWith(selectedDate)) {
                        let rSlot = rawDetail.substring(11).split('(')[0].trim();
                        if(rSlot) {
                            scheduleCount[rSlot] = (scheduleCount[rSlot] || 0) + 1;
                        }
                    }
                }
            });

            const sel = document.getElementById('timeInput');
            const prevSelectedValue = sel.value; 
            sel.innerHTML = "";
            
            for(let i=0; i<24; i++){
                let h = i < 10 ? '0'+i : i; let nH = (i+1)%24; nH = nH < 10 ? '0'+nH : nH;
                let slot = `${h}:00 - ${nH}:00`; 
                
                let count = scheduleCount[slot] || 0;
                
                // 核心邏輯：如果選擇的日期是「今天」，且該時段的小時小於等於當前小時，則直接全面阻斷
                if (selectedDate === todayStr && i <= currentHour) {
                    sel.innerHTML += `<option value="${slot}" disabled class="text-gray-400">${slot} (❌ 已過時段)</option>`;
                } else if(count >= 4) {
                    sel.innerHTML += `<option value="${slot}" disabled class="text-red-400">${slot} (❌ 已額滿 4/4)</option>`;
                } else {
                    sel.innerHTML += `<option value="${slot}">${slot} (👤 目前 ${count}/4 人)</option>`;
                }
            }
            if(prevSelectedValue) sel.value = prevSelectedValue; 

            let myTodayHtml = "";
            globalRecords.forEach(r => {
                if(r.user === curUser.acc && r.type && r.type.includes('預約排班') && r.detail) {
                    const rawDetail = r.detail.trim();
                    if (rawDetail.startsWith(selectedDate)) {
                        const cleanSlot = rawDetail.substring(11).split('(')[0].trim();
                        myTodayHtml += `<div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl border border-blue-100 text-xs font-bold text-gray-700">
                            <span><i class="fa fa-clock-o text-blue-500"></i> ${cleanSlot}</span>
                            <button onclick="cancelSchedule('${r.key}')" class="text-red-500 border border-red-200 px-3 py-1 rounded-lg bg-white active:bg-red-50 shadow-sm font-bold">取消預約</button>
                        </div>`;
                    }
                }
            });
            document.getElementById('myTodayScheduleList').innerHTML = myTodayHtml || `<p class="text-gray-400 text-center col-span-full py-2 text-xs">您當天尚未安排 any 時段</p>`;
        }

        window.submitSchedule = () => {
            const d = document.getElementById('dateInput').value;
            let t = document.getElementById('timeInput').value;
            if(!d || !t) return alert('請選擇日期與時段');
            if(t.includes('已額滿')) return alert('該時段已額滿，請選擇其他時段');
            if(t.includes('已過時段')) return alert('該時段已經過去，無法辦理補預約！');

            t = t.split('(')[0].trim();
            const inputDate = new Date(d + "T00:00:00");
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const diffTime = inputDate.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0 || diffDays > 2) {
                alert("🚨 系統阻斷：本系統僅開放預約「今天、明天、後天」這3天內的時段！");
                initDateRange();
                return;
            }

            // 後端再做一次當前小時的即時防禦阻斷
            const now = new Date();
            const formatDate = (d) => d.toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
            if (d === formatDate(now)) {
                const targetHour = parseInt(t.split(':')[0], 10);
                if (targetHour <= now.getHours()) {
                    return alert("🚨 系統阻斷：您無法選擇當前小時或過去的時段！");
                }
            }

            const targetDetail = `${d} ${t}`;
            let isDuplicated = false;

            globalRecords.forEach(r => {
                if(r.user === curUser.acc && r.type && r.type.includes('預約排班')) {
                    const cleanDetail = r.detail.split('(')[0].trim();
                    if(cleanDetail === targetDetail) isDuplicated = true;
                }
            });

            if(isDuplicated) {
                alert(`🚨 提示：您已經登記過 ${d} 的 ${t} 時段了，請勿重複卡位預約！`);
            } else {
                sendRecord('預約排班', targetDetail).then(() => alert('成功送出！'));
            }
        };

        window.cancelSchedule = (key) => {
            if(confirm('確定要取消這個時段的排班嗎？')) {
                db.ref('attendance_records/' + key).remove().then(() => {
                    alert('已成功取消排班，名額已釋放！');
                });
            }
        };

        window.adminDeleteRecord = (key, nick, detail) => {
            if(confirm(`⚠️ 廳長權限確認：\n確定要強制刪除「${nick}」的排班：\n【${detail}】嗎？`)) {
                db.ref('attendance_records/' + key).remove().then(() => {
                    alert('已成功強制移除該成員排班！');
                });
            }
        };

        function loadLogs() {
            const limit = Date.now() - (45 * 24 * 60 * 60 * 1000);
            db.ref('attendance_records').orderByChild('timestamp').startAt(limit).on('value', snap => {
                let p = ""; let a = ""; globalRecords = [];
                const list = [];
                
                snap.forEach(c => { 
                    const v = c.val(); 
                    v.key = c.key; 
                    list.push(v); 
                    globalRecords.push(v); 
                });
                
                list.reverse().forEach(r => {
                    const isImg = r.detail && r.detail.startsWith('data:image');
                    const cleanShowDetail = (r.type && r.type.includes('預約排班')) ? r.detail.split('(')[0].trim() : r.detail;
                    
                    let imgTagLabel = "";
                    if (isImg) {
                        if (r.type === "上班打卡") imgTagLabel = `<div class="text-left text-green-600 font-bold mb-1 text-[10px]"><i class="fa fa-arrow-circle-up"></i> 【上班打卡截圖】</div>`;
                        if (r.type === "下班打卡") imgTagLabel = `<div class="text-left text-orange-600 font-bold mb-1 text-[10px]"><i class="fa fa-arrow-circle-down"></i> 【下班打卡截圖】</div>`;
                    }
                    
                    const display = isImg ? `${imgTagLabel}<img src="${r.detail}" class="record-img mx-auto" loading="lazy" onclick="window.open(this.src)">` : `<div class="bg-gray-50 p-2 rounded text-gray-500 font-bold">${cleanShowDetail}</div>`;
                    
                    let typeTagClass = "text-gray-400";
                    if (r.type === "上班打卡") typeTagClass = "text-green-600 font-extrabold";
                    if (r.type === "下班打卡") typeTagClass = "text-orange-600 font-extrabold";
                    if (r.type === "預約排班") typeTagClass = "text-blue-600";

                    const card = `<div class="p-4 bg-white rounded-2xl shadow-sm mb-1 border border-gray-100 text-[11px]">
                        <div class="flex justify-between items-center mb-1"><span class="font-bold text-blue-600">${r.nick}</span><span class="text-gray-300 font-normal">${r.time}</span></div>
                        <div class="${typeTagClass} mb-2 font-bold">${r.type}</div>${display}
                    </div>`;
                    if(r.user === curUser.acc) p += card;

                    let adminDeleteBtn = "";
                    if(r.type && r.type.includes('預約排班')) {
                        adminDeleteBtn = `<button onclick="adminDeleteRecord('${r.key}', '${r.nick}', '${cleanShowDetail}')" class="text-[10px] bg-red-50 text-red-600 border border-red-200 px-2 py-1 rounded-lg font-bold hover:bg-red-100 transition">強制刪除</button>`;
                    }

                    const adminCard = `<div class="p-4 bg-white rounded-2xl shadow-sm border border-gray-100 text-[11px]">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-gray-700">${r.nick} <span class="text-gray-400 font-normal">(${r.user})</span></span>
                            <span class="text-gray-300 font-normal">${r.time}</span>
                        </div>
                        <div class="flex justify-between items-center mt-1">
                            <span class="${typeTagClass}">${r.type}</span>
                            ${adminDeleteBtn}
                        </div>
                        <div class="mt-2">${display}</div>
                    </div>`;
                    a += adminCard;
                });
                document.getElementById('personalList').innerHTML = p || "<p class='col-span-full text-center text-gray-400 py-4'>目前無紀錄</p>";
                document.getElementById('adminAllList').innerHTML = a || "<p class='col-span-full text-center text-gray-400 py-4'>目前無紀錄</p>";
                
                updateTimeOptions();
            });
        }

        window.exportToExcel = () => {
            if (globalRecords.length === 0) return alert('無紀錄可導出');
            const dateCountMap = {};
            globalRecords.forEach(r => {
                const d = r.time ? r.time.split(' ')[0] : "未知";
                const k = `${r.user}_${d}`;
                dateCountMap[k] = (dateCountMap[k] || 0) + 1;
            });
            const data = globalRecords.map(r => {
                const t = r.time ? r.time.split(' ') : ["未知", "未知"];
                const cleanExcelDetail = (r.type && r.type.includes('預約排班')) ? r.detail.split('(')[0].trim() : "圖片截圖";
                return { "成員": r.nick, "帳號": r.user, "日期": t[0], "時間": t[1], "當天次數": dateCountMap[`${r.user}_${t[0]}`], "項目": r.type, "詳細內容": cleanExcelDetail };
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "報表");
            XLSX.writeFile(wb, `金好家族報表_${new Date().toLocaleDateString().replace(/\//g,'-')}.xlsx`);
        };

        function loadUserList() {
            db.ref('users').on('value', snap => {
                let h = ""; let count = 0;
                snap.forEach(c => {
                    const u = c.val(); if(u.acc === 'admin') return; count++;
                    h += `<div class="flex justify-between items-center bg-white p-3 rounded-xl border mb-2 text-xs">
                        <span><b>${u.nick}</b> (${u.acc})</span>
                        <button onclick="deleteUser('${u.acc}')" class="text-red-500 border px-2 py-1 rounded hover:bg-red-50">除名</button>
                    </div>`;
                });
                document.getElementById('userList').innerHTML = h;
                document.getElementById('userCount').innerText = count;
            });
        }

        window.deleteUser = (acc) => { if(confirm(`確定除名 ${acc}？`)) db.ref('users/'+acc).remove(); };
        
        function loadAdminData() {
            db.ref('pending_users').on('value', snap => {
                let h = "";
                snap.forEach(c => {
                    const u = c.val();
                    h += `<div class="p-4 bg-red-50 rounded-2xl flex justify-between items-center text-xs mb-3 shadow-sm">
                        <span><b>${u.nick}</b> (${u.acc})</span>
                        <button onclick="approve('${u.acc}')" class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold hover:bg-red-600">准許</button>
                    </div>`;
                });
                document.getElementById('pendingList').innerHTML = h || "<p class='text-gray-400 text-center py-2 text-xs w-full'>目前無申請</p>";
            });
        }

        window.approve = (acc) => {
            db.ref('pending_users/'+acc).once('value', snap => {
                db.ref('users/'+acc).set(snap.val()).then(() => db.ref('pending_users/'+acc).remove());
            });
        };

        window.doUpdateName = () => {
            const n = document.getElementById('newNick').value.trim();
            if(n && curUser.acc !== 'admin') db.ref('users/'+curUser.acc+'/nick').set(n).then(() => location.reload());
        };

        function bindNavEvents() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.getElementById(btn.dataset.target).classList.add('active');
                };
            });
        }
        bindNavEvents();
    </script>
</body>
</html>
