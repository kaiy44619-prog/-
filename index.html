<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金好家族陪檔打卡表</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .nav-btn.active { background-color: #2563eb; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .record-img { max-width: 150px; border-radius: 8px; margin-top: 5px; cursor: pointer; border: 1px solid #eee; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="app" class="max-w-md mx-auto px-4 py-6">
        
        <div id="authPage" class="bg-white p-8 rounded-3xl shadow-xl mt-10 text-center">
            <h2 class="text-2xl font-bold mb-6 text-blue-600">金好家族系統</h2>
            <div id="loginForm" class="space-y-4 text-left">
                <input id="loginAcc" type="text" placeholder="帳號" class="w-full p-4 border rounded-2xl outline-none">
                <input id="loginPwd" type="password" placeholder="密碼" class="w-full p-4 border rounded-2xl outline-none">
                <button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">進入系統</button>
                <p class="text-center text-sm text-gray-400 mt-4 cursor-pointer" onclick="toggleAuth(true)">成員註冊申請</p>
            </div>
            <div id="regForm" class="hidden space-y-4 text-left">
                <input id="regAcc" type="text" placeholder="設定登入帳號" class="w-full p-4 border rounded-2xl outline-none">
                <input id="regNick" type="text" placeholder="顯示暱稱" class="w-full p-4 border rounded-2xl outline-none">
                <input id="regPwd" type="password" placeholder="設定密碼" class="w-full p-4 border rounded-2xl outline-none">
                <button id="regBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg">提交註冊</button>
                <p class="text-center text-sm text-gray-400 mt-4 cursor-pointer" onclick="toggleAuth(false)">返回登入</p>
            </div>
        </div>

        <div id="mainPage" class="hidden">
            <div class="flex justify-between items-center mb-4 px-2">
                <h1 class="text-xl font-bold text-blue-600">Hi, <span id="userHello">載入中</span></h1>
                <button onclick="location.reload()" class="text-xs bg-gray-200 px-3 py-1 rounded text-gray-500">登出</button>
            </div>

            <nav class="grid grid-cols-4 bg-white rounded-2xl shadow-sm mb-4 p-1 border">
                <button class="py-3 rounded-xl font-bold nav-btn active" data-target="schedule">預約</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="checkin">打卡</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="history">紀錄</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="profile">個人</button>
            </nav>

            <div id="adminQuickLink" class="hidden mb-4 bg-red-600 text-white p-5 rounded-2xl shadow-lg flex justify-between items-center cursor-pointer" onclick="showAdmin()">
                <div>
                    <p class="font-bold text-lg">審核管理後台</p>
                    <p class="text-xs opacity-80">查閱全體成員截圖與審核</p>
                </div>
                <i class="fa fa-camera text-2xl"></i>
            </div>

            <section id="schedule" class="tab-content active bg-white p-6 rounded-2xl border">
                <h3 class="font-bold mb-4">排班預約</h3>
                <input type="date" id="dateInput" class="w-full p-4 border rounded-xl mb-3 bg-gray-50 text-sm">
                <select id="timeInput" class="w-full p-4 border rounded-xl mb-4 bg-gray-50 text-sm"></select>
                <button onclick="sendRecord('預約排班', document.getElementById('dateInput').value + ' ' + document.getElementById('timeInput').value)" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">送出資料</button>
            </section>

            <section id="checkin" class="tab-content bg-white p-6 rounded-2xl border text-center">
                <div class="mb-4 p-3 rounded-xl text-xs font-bold bg-blue-50 text-blue-600">● 24H 打卡通道開放中</div>
                <div class="mb-4">
                    <label class="block w-full border-2 border-dashed border-gray-300 rounded-2xl p-6 cursor-pointer hover:bg-gray-50">
                        <i class="fa fa-camera text-3xl text-gray-400 mb-2"></i>
                        <span id="fileNameDisplay" class="block text-sm text-gray-500">點擊選取或拍攝截圖</span>
                        <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="previewImage()">
                    </label>
                </div>
                <button id="checkBtn" onclick="handleImageCheckin()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-md">提交截圖打卡</button>
            </section>

            <section id="history" class="tab-content bg-white p-4 rounded-2xl border min-h-[300px]">
                <div id="personalList" class="space-y-4 text-xs"></div>
            </section>

            <section id="profile" class="tab-content bg-white p-6 rounded-2xl border">
                <h3 class="font-bold mb-4 text-center text-sm">修改名字</h3>
                <input id="newNick" type="text" class="w-full p-4 border rounded-xl mb-4 text-sm" placeholder="輸入新暱稱">
                <button onclick="doUpdateName()" class="w-full bg-black text-white py-4 rounded-xl font-bold">儲存修改</button>
            </section>

            <section id="admin" class="tab-content bg-white p-6 rounded-2xl border-2 border-red-500 shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-red-600">管理後台</h3>
                    <button onclick="closeAdmin()" class="text-xs text-gray-400">返回</button>
                </div>
                <div id="pendingList" class="space-y-3 mb-6"></div>
                <hr class="my-6">
                <h3 class="font-bold mb-4 text-gray-700 text-sm">全體成員最新截圖 (最新 50 筆)</h3>
                <div id="adminAllList" class="space-y-4 max-h-[500px] overflow-y-auto"></div>
            </section>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA39fdKxRtNh_-MfrhpzzqtOu1MV9VE7VM",
          authDomain: "yuesheng-system-56669.firebaseapp.com",
          databaseURL: "https://yuesheng-system-56669-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "yuesheng-system-56669",
          appId: "1:747414817349:web:ce06a488187dcf88ca712c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let curUser = null;

        function toggleAuth(isReg) {
            document.getElementById('loginForm').classList.toggle('hidden', isReg);
            document.getElementById('regForm').classList.toggle('hidden', !isReg);
        }

        document.getElementById('loginBtn').onclick = () => {
            const acc = document.getElementById('loginAcc').value.trim().toLowerCase();
            const pwd = document.getElementById('loginPwd').value.trim();
            if(acc === 'admin' && pwd === '123') loginOk({ acc:'admin', nick:'岳笙', role:'admin' });
            else {
                db.ref('users/'+acc).once('value', snap => {
                    const d = snap.val();
                    if(d && d.pwd === pwd) loginOk({...d, role:'user'});
                    else alert('帳密錯誤或帳號尚未審核通過');
                });
            }
        };

        function loginOk(u) {
            curUser = u;
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userHello').innerText = curUser.nick;
            document.getElementById('newNick').value = curUser.nick;
            if(curUser.role === 'admin') {
                document.getElementById('adminQuickLink').classList.remove('hidden');
                loadAdminData();
            }
            loadLogs();
        }

        window.previewImage = () => {
            const file = document.getElementById('imgInput').files[0];
            if(file) document.getElementById('fileNameDisplay').innerText = "已選取：" + file.name;
        };

        window.handleImageCheckin = () => {
            const fileInput = document.getElementById('imgInput');
            const file = fileInput.files[0];
            if(!file) return alert('請先選取截圖檔案');

            const reader = new FileReader();
            reader.onload = function(e) {
                sendRecord('拍照打卡', e.target.result);
                fileInput.value = "";
                document.getElementById('fileNameDisplay').innerText = "點擊選取或拍攝截圖";
            };
            reader.readAsDataURL(file);
        };

        window.sendRecord = (type, detail) => {
            db.ref('attendance_records').push({
                user: curUser.acc, nick: curUser.nick, type, detail,
                time: new Date().toLocaleString('zh-TW', {hour12:false})
            }).then(() => alert('已成功送出紀錄！'));
        };

        function loadLogs() {
            db.ref('attendance_records').limitToLast(50).on('value', snap => {
                let h = ""; let all = "";
                const list = []; snap.forEach(c => list.push(c.val()));
                list.reverse().forEach(r => {
                    const isImg = r.detail.startsWith('data:image');
                    const display = isImg ? `<img src="${r.detail}" class="record-img" onclick="window.open(this.src)">` : r.detail;
                    const line = `<div class="p-3 border-b bg-white rounded-xl shadow-sm mb-2">
                        <div class="flex justify-between font-bold text-blue-600 mb-1"><span>${r.nick}</span> <span class="text-gray-300 text-[10px]">${r.time}</span></div>
                        <div class="text-xs text-gray-500 mb-2">${r.type}</div>
                        <div>${display}</div>
                    </div>`;
                    if(r.user === curUser.acc) h += line;
                    all += line;
                });
                document.getElementById('personalList').innerHTML = h || "尚無任何紀錄";
                document.getElementById('adminAllList').innerHTML = all;
            });
        }

        window.showAdmin = () => { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById('admin').classList.add('active'); };
        window.closeAdmin = () => { document.getElementById('admin').classList.remove('active'); document.getElementById('schedule').classList.add('active'); };
        
        function loadAdminData() {
            db.ref('pending_users').on('value', snap => {
                let h = "";
                snap.forEach(c => {
                    const u = c.val();
                    h += `<div class="p-3 bg-red-50 rounded-xl flex justify-between items-center text-xs">
                        <span><b>${u.nick}</b> (${u.acc})</span>
                        <button onclick="approve('${u.acc}')" class="bg-red-500 text-white px-3 py-1 rounded-lg">核准</button>
                    </div>`;
                });
                document.getElementById('pendingList').innerHTML = h || "目前沒有新的註冊申請";
            });
        }

        window.approve = (acc) => {
            db.ref('pending_users/'+acc).once('value', snap => {
                db.ref('users/'+acc).set(snap.val()).then(() => db.ref('pending_users/'+acc).remove());
            });
        };

        window.doUpdateName = () => {
            const n = document.getElementById('newNick').value.trim();
            if(!n || curUser.acc === 'admin') return;
            db.ref('users/'+curUser.acc+'/nick').set(n).then(() => location.reload());
        };

        const sel = document.getElementById('timeInput');
        for(let i=0; i<24; i++){
            let h = i < 10 ? '0'+i : i;
            let nH = (i+1)%24; nH = nH < 10 ? '0'+nH : nH;
            let opt = `${h}:00-${nH}:00`;
            sel.innerHTML += `<option value="${opt}">${opt}</option>`;
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(btn.dataset.target).classList.add('active');
            };
        });
    </script>
</body>
</html>
