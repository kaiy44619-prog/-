<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岳笙團隊雲端系統 v9.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .nav-btn.active { background-color: #2563eb; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app" class="max-w-md mx-auto px-4 py-6">
        
        <!-- 登入與註冊介面 -->
        <div id="authPage" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 id="authTitle" class="text-2xl font-bold text-center mb-6 text-blue-600">岳笙系統登入</h2>
            
            <div id="loginForm" class="space-y-4">
                <input id="loginAcc" type="text" placeholder="帳號" class="w-full p-4 border rounded-2xl outline-none">
                <input id="loginPwd" type="password" placeholder="密碼" class="w-full p-4 border rounded-2xl outline-none">
                <button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">登入系統</button>
                <p class="text-center text-sm text-gray-400 cursor-pointer" onclick="toggleAuth(true)">點此註冊新帳號</p>
            </div>

            <div id="regForm" class="hidden space-y-4">
                <input id="regAcc" type="text" placeholder="設定登入帳號" class="w-full p-4 border rounded-2xl outline-none">
                <input id="regNick" type="text" placeholder="真實暱稱 (審核用)" class="w-full p-4 border rounded-2xl outline-none">
                <input id="regPwd" type="password" placeholder="設定密碼" class="w-full p-4 border rounded-2xl outline-none">
                <button id="regBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg">提交申請</button>
                <p class="text-center text-sm text-gray-400 cursor-pointer" onclick="toggleAuth(false)">已有帳號？返回登入</p>
            </div>
        </div>

        <!-- 主功能介面 -->
        <div id="mainPage" class="hidden">
            <div class="flex justify-between items-center mb-4 px-2">
                <div>
                    <p class="text-[10px] text-gray-400">目前使用者</p>
                    <h1 class="text-xl font-bold text-blue-600" id="userHello">載入中...</h1>
                </div>
                <button onclick="location.reload()" class="bg-gray-200 text-gray-600 px-3 py-1 rounded-lg text-xs">登出</button>
            </div>

            <nav class="grid grid-cols-4 bg-white rounded-2xl shadow-sm mb-6 p-1 gap-1 text-[11px] text-center border">
                <button class="py-3 rounded-xl font-bold nav-btn active" data-target="schedule">預約</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="checkin">打卡</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="history">紀錄</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="profile">個人</button>
            </nav>

            <!-- 管理員專屬紅色入口 (只有管理員看得到) -->
            <div id="adminQuickLink" class="hidden mb-6 bg-red-600 text-white p-4 rounded-2xl shadow-lg flex justify-between items-center" onclick="showAdminTab()">
                <div>
                    <p class="font-bold">總監專屬：待審核清單</p>
                    <p class="text-[10px] opacity-80">點擊此處處理成員申請</p>
                </div>
                <i class="fa fa-chevron-right"></i>
            </div>

            <!-- 介面內容 -->
            <section id="schedule" class="tab-content active space-y-4">
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 class="font-bold mb-4">預約排班 (24H)</h3>
                    <input type="date" id="dateInput" class="w-full p-4 border rounded-xl mb-3 bg-gray-50">
                    <select id="timeInput" class="w-full p-4 border rounded-xl mb-4 bg-gray-50"></select>
                    <button onclick="sendRecord('預約排班', document.getElementById('dateInput').value + ' ' + document.getElementById('timeInput').value)" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">送出雲端預約</button>
                </div>
            </section>

            <section id="checkin" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-2xl border shadow-sm text-center">
                    <div id="checkinStatus" class="mb-4 p-3 rounded-xl text-xs font-bold"></div>
                    <label class="block w-full bg-gray-50 border-2 border-dashed border-gray-300 py-12 rounded-2xl mb-4 cursor-pointer">
                        <i class="fa fa-image text-4xl text-gray-300 mb-2"></i>
                        <span class="block text-gray-400">點擊上傳截圖</span>
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                    </label>
                    <button id="checkBtn" onclick="sendRecord('拍照打卡', '✅ 已成功上傳')" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-lg">立即提交打卡</button>
                </div>
            </section>

            <section id="history" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-2xl border shadow-sm min-h-[300px]">
                    <h3 class="font-bold mb-4">最近 50 筆紀錄</h3>
                    <div id="personalList" class="space-y-3"></div>
                </div>
            </section>

            <section id="profile" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 class="font-bold mb-6 text-center">修改我的暱稱</h3>
                    <div class="space-y-4">
                        <input id="newNick" type="text" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="輸入新名稱">
                        <button onclick="updateNickname()" class="w-full bg-black text-white py-4 rounded-xl font-bold shadow-md">儲存並重新整理</button>
                    </div>
                </div>
            </section>

            <!-- 管理員介面 -->
            <section id="admin" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-2xl border-2 border-red-200 shadow-sm">
                    <div class="flex justify-between mb-4">
                        <h3 class="font-bold text-red-600">待審核成員</h3>
                        <button onclick="closeAdminTab()" class="text-xs text-gray-400">返回功能區</button>
                    </div>
                    <div id="pendingList" class="space-y-3"></div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA39fdKxRtNh_-MfrhpzzqtOu1MV9VE7VM",
          authDomain: "yuesheng-system-56669.firebaseapp.com",
          databaseURL: "https://yuesheng-system-56669-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "yuesheng-system-56669",
          appId: "1:747414817349:web:ce06a488187dcf88ca712c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;

        function toggleAuth(isReg) {
            document.getElementById('authTitle').innerText = isReg ? '註冊申請' : '岳笙系統登入';
            document.getElementById('loginForm').classList.toggle('hidden', isReg);
            document.getElementById('regForm').classList.toggle('hidden', !isReg);
        }

        // 登入邏輯 (強制管理員優先)
        document.getElementById('loginBtn').onclick = () => {
            const acc = document.getElementById('loginAcc').value.trim().toLowerCase();
            const pwd = document.getElementById('loginPwd').value.trim();

            if(acc === 'admin' && pwd === '123') {
                return loginSuccess({ acc: 'admin', nick: '岳笙總監', role: 'admin' });
            }

            db.ref('users/' + acc).once('value', snap => {
                const d = snap.val();
                if(d && d.pwd === pwd) {
                    loginSuccess({ ...d, role: 'user' });
                } else {
                    alert('帳號密碼錯誤，或該帳號尚未核准！');
                }
            });
        };

        // 註冊申請
        document.getElementById('regBtn').onclick = () => {
            const acc = document.getElementById('regAcc').value.trim().toLowerCase();
            const nick = document.getElementById('regNick').value.trim();
            const pwd = document.getElementById('regPwd').value.trim();
            if(!acc || !nick || !pwd) return alert('請完整填寫');
            db.ref('pending_users/' + acc).set({ acc, nick, pwd }).then(() => {
                alert('申請已送出，請通知總監審核！');
                location.reload();
            });
        };

        function loginSuccess(u) {
            currentUser = u;
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userHello').innerText = currentUser.nick;
            document.getElementById('newNick').value = currentUser.nick;
            
            if(currentUser.role === 'admin') {
                document.getElementById('adminQuickLink').classList.remove('hidden');
                loadPending();
            }
            loadRecords();
        }

        // [重要] 改名並強制重新讀取
        window.updateNickname = () => {
            const n = document.getElementById('newNick').value.trim();
            if(!n) return;
            db.ref('users/' + currentUser.acc + '/nick').set(n).then(() => {
                alert('名字已更改！系統將自動重新登入以生效。');
                location.reload(); // 強制刷新頁面，確保所有變數重新讀取
            });
        };

        // 審核功能
        function showAdminTab() {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('admin').classList.add('active');
        }
        function closeAdminTab() {
            document.getElementById('admin').classList.remove('active');
            document.getElementById('schedule').classList.add('active');
        }

        function loadPending() {
            db.ref('pending_users').on('value', snap => {
                let h = "";
                snap.forEach(c => {
                    const u = c.val();
                    h += `<div class="p-3 bg-red-50 border border-red-100 rounded-xl flex justify-between items-center text-sm">
                        <span><b>${u.nick}</b> (${u.acc})</span>
                        <button onclick="approve('${u.acc}')" class="bg-red-500 text-white px-4 py-1 rounded-lg font-bold shadow-sm">核准</button>
                    </div>`;
                });
                document.getElementById('pendingList').innerHTML = h || "目前沒有新的申請";
            });
        }

        window.approve = (acc) => {
            db.ref('pending_users/'+acc).once('value', snap => {
                const data = snap.val();
                db.ref('users/'+acc).set(data).then(() => {
                    db.ref('pending_users/'+acc).remove();
                    alert(acc + ' 已核准！');
                });
            });
        };

        // 下拉時段 24H
        const sel = document.getElementById('timeInput');
        for(let i=0; i<24; i++){
            let h = i < 10 ? '0'+i : i;
            let nH = (i+1)%24; nH = nH < 10 ? '0'+nH : nH;
            let opt = document.createElement('option');
            opt.value = `${h}:00-${nH}:00`; opt.innerText = opt.value;
            sel.appendChild(opt);
        }

        // 送出紀錄
        window.sendRecord = (type, detail) => {
            db.ref('attendance_records').push({
                user: currentUser.acc, nick: currentUser.nick, type, detail,
                time: new Date().toLocaleString('zh-TW', {hour12:false})
            }).then(() => alert('雲端同步成功！'));
        };

        function loadRecords() {
            db.ref('attendance_records').limitToLast(50).on('value', snap => {
                let myH = "";
                const list = []; snap.forEach(c => list.push(c.val()));
                list.reverse().forEach(r => {
                    if(r.user === currentUser.acc || currentUser.role === 'admin') {
                        myH += `<div class="p-3 border-b text-xs flex justify-between">
                            <div><b>${r.nick}</b>: ${r.type}<br><span class="text-gray-400">${r.time}</span></div>
                            <div class="text-blue-500 font-bold">${r.detail}</div>
                        </div>`;
                    }
                });
                document.getElementById('personalList').innerHTML = myH || "尚無任何紀錄";
            });
        }

        // 切換 Tab
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(btn.dataset.target).classList.add('active');
            };
        });

        // 打卡時鐘
        setInterval(() => {
            const min = new Date().getMinutes();
            const isOk = (min >= 58 || min <= 3);
            const status = document.getElementById('checkinStatus');
            const btn = document.getElementById('checkBtn');
            status.innerText = isOk ? "● 現在是打卡時段" : "○ 非打卡時段 (每小時 58~03 分)";
            status.className = isOk ? "mb-4 p-3 bg-green-100 text-green-700 rounded-xl font-bold" : "mb-4 p-3 bg-red-50 text-red-400 rounded-xl font-bold text-[10px]";
            btn.disabled = !isOk;
            btn.style.opacity = isOk ? "1" : "0.4";
        }, 1000);
    </script>
</body>
</html>
