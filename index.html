<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岳笙團隊雲端系統 v7.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .nav-btn.active { background-color: #2563eb; color: white; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="app" class="max-w-md mx-auto px-4 py-8">
        
        <div id="authPage" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 id="authTitle" class="text-2xl font-bold text-center mb-6 text-blue-600">帳號登入</h2>
            
            <div id="loginForm" class="space-y-4">
                <input id="loginAcc" type="text" placeholder="帳號" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <input id="loginPwd" type="password" placeholder="密碼" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">進入系統</button>
                <p class="text-center text-sm text-gray-500 cursor-pointer" onclick="toggleAuth(true)">沒有帳號？按此註冊</p>
            </div>

            <div id="regForm" class="hidden space-y-4">
                <input id="regAcc" type="text" placeholder="設定登入帳號" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400">
                <input id="regNick" type="text" placeholder="你的真實暱稱" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400">
                <input id="regPwd" type="password" placeholder="設定密碼" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400">
                <button id="regBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg">提交註冊申請</button>
                <p class="text-center text-sm text-gray-500 cursor-pointer" onclick="toggleAuth(false)">已有帳號？返回登入</p>
            </div>
            <p class="text-center text-[10px] text-gray-300 mt-6 italic">岳笙團隊雲端架構 v7.5</p>
        </div>

        <div id="mainPage" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-lg font-bold"><span id="userHello" class="text-blue-600"></span></h1>
                <div class="text-[10px] text-gray-400 font-mono" id="liveClock">00:00:00</div>
                <button onclick="location.reload()" class="text-gray-400 p-2"><i class="fa fa-sign-out"></i></button>
            </div>

            <nav class="grid grid-cols-4 bg-white rounded-2xl shadow-sm mb-6 p-1 gap-1 text-[11px] text-center border">
                <button class="py-3 rounded-xl font-bold nav-btn active" data-target="schedule">預約</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="checkin">打卡</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="history">考勤</button>
                <button class="py-3 rounded-xl font-bold nav-btn" data-target="profile">個人</button>
                <button id="adminTab" class="col-span-4 py-2 mt-1 rounded-lg font-bold hidden text-red-500 bg-red-50 border border-red-100" data-target="admin">管理員：審核與報表</button>
            </nav>

            <section id="schedule" class="tab-content block">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold mb-4 text-gray-700">申請排班時段</h3>
                    <input type="date" id="dateInput" class="w-full p-3 border rounded-xl mb-3 outline-none">
                    <select id="timeInput" class="w-full p-3 border rounded-xl mb-4 text-sm font-mono"></select>
                    <button onclick="sendRecord('預約排班', document.getElementById('dateInput').value + ' ' + document.getElementById('timeInput').value)" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">送出雲端預約</button>
                </div>
            </section>

            <section id="checkin" class="tab-content hidden text-center">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <div id="checkinStatus" class="mb-4 p-2 rounded-lg text-xs font-bold"></div>
                    <label class="block w-full bg-gray-50 border-2 border-dashed border-gray-300 py-10 rounded-2xl mb-4 cursor-pointer">
                        <i class="fa fa-camera text-3xl text-gray-300 mb-2"></i>
                        <span class="block text-gray-400 text-xs">點擊上傳截圖</span>
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                    </label>
                    <div id="previewArea" class="hidden mb-4"><img id="imgPrev" class="rounded-lg shadow-md mx-auto max-h-40"></div>
                    <button id="checkBtn" onclick="sendRecord('拍照打卡', '✅ 已上傳截圖')" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-lg">立即打卡</button>
                </div>
            </section>

            <section id="history" class="tab-content hidden">
                <div class="bg-white p-6 rounded-2xl shadow-sm border min-h-[300px]">
                    <h3 class="font-bold mb-4 text-gray-700 text-sm">個人考勤明細</h3>
                    <div id="personalList" class="space-y-3"></div>
                </div>
            </section>

            <section id="profile" class="tab-content hidden">
                <div class="bg-white p-6 rounded-2xl shadow-sm border text-center">
                    <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">
                        <i class="fa fa-user"></i>
                    </div>
                    <h3 class="font-bold mb-6">個人資料設定</h3>
                    <div class="text-left space-y-4">
                        <div>
                            <label class="text-[10px] text-gray-400 ml-1">修改顯示暱稱</label>
                            <input id="newNick" type="text" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="輸入新暱稱">
                        </div>
                        <button onclick="updateNickname()" class="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold">儲存修改</button>
                    </div>
                </div>
            </section>

            <section id="admin" class="tab-content hidden">
                <div class="space-y-4">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h3 class="font-bold mb-4 text-red-500">待審核帳號</h3>
                        <div id="pendingList" class="space-y-3"></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-gray-700">全體考勤報表</h3>
                            <button id="exportBtn" class="text-[10px] bg-black text-white px-2 py-1 rounded">匯出 CSV</button>
                        </div>
                        <div id="adminFullList" class="space-y-2 text-[10px] max-h-60 overflow-y-auto font-mono"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA39fdKxRtNh_-MfrhpzzqtOu1MV9VE7VM",
          authDomain: "yuesheng-system-56669.firebaseapp.com",
          databaseURL: "https://yuesheng-system-56669-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "yuesheng-system-56669",
          appId: "1:747414817349:web:ce06a488187dcf88ca712c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = null;

        function toggleAuth(isReg) {
            document.getElementById('authTitle').innerText = isReg ? '帳號註冊' : '帳號登入';
            document.getElementById('loginForm').classList.toggle('hidden', isReg);
            document.getElementById('regForm').classList.toggle('hidden', !isReg);
        }

        // 註冊
        document.getElementById('regBtn').onclick = () => {
            const acc = document.getElementById('regAcc').value.trim().toLowerCase();
            const nick = document.getElementById('regNick').value.trim();
            const pwd = document.getElementById('regPwd').value.trim();
            if(!acc || !nick || !pwd) return alert('請填寫完整資訊');
            db.ref('pending_users/' + acc).set({ acc, nick, pwd }).then(() => {
                alert('註冊申請已送出，請通知管理員審核！');
                location.reload();
            });
        };

        // 登入
        document.getElementById('loginBtn').onclick = () => {
            const acc = document.getElementById('loginAcc').value.trim().toLowerCase();
            const pwd = document.getElementById('loginPwd').value.trim();
            if(acc === 'admin' && pwd === '123') return loginSuccess({ acc:'admin', nick:'岳笙總監', role:'admin' });
            
            db.ref('users/' + acc).once('value', snap => {
                const d = snap.val();
                if(d && d.pwd === pwd) loginSuccess({ ...d, role: 'user' });
                else alert('帳密錯誤或帳號尚未審核通過！');
            });
        };

        function loginSuccess(u) {
            user = u;
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userHello').innerText = "Hi, " + user.nick;
            document.getElementById('newNick').value = user.nick;
            if(user.role === 'admin') {
                document.getElementById('adminTab').classList.remove('hidden');
                loadPending();
            }
            loadRecords();
        }

        // 審核
        function loadPending() {
            db.ref('pending_users').on('value', snap => {
                let h = "";
                snap.forEach(c => {
                    const u = c.val();
                    h += `<div class="p-3 bg-gray-50 rounded-xl border flex justify-between items-center text-xs">
                        <div><b>${u.nick}</b> (${u.acc})</div>
                        <button onclick="approve('${u.acc}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg">核准</button>
                    </div>`;
                });
                document.getElementById('pendingList').innerHTML = h || "暫無申請";
            });
        }

        window.approve = (acc) => {
            db.ref('pending_users/'+acc).once('value', snap => {
                db.ref('users/'+acc).set(snap.val()).then(() => {
                    db.ref('pending_users/'+acc).remove();
                    alert(acc + ' 已核准進入系統');
                });
            });
        };

        // 修改暱稱
        window.updateNickname = () => {
            const n = document.getElementById('newNick').value.trim();
            if(!n) return;
            db.ref('users/' + user.acc + '/nick').set(n).then(() => {
                alert('暱稱已更新！請重新整理頁面');
                location.reload();
            });
        };

        // 雲端紀錄
        window.sendRecord = (type, detail) => {
            if(type === '拍照打卡' && !document.getElementById('fileInput').files[0]) return alert('請先選取截圖照片');
            db.ref('attendance_records').push({
                user: user.acc, nick: user.nick, type, detail,
                time: new Date().toLocaleString('zh-TW', {hour12:false})
            }).then(() => {
                alert('✅ 紀錄已同步');
                if(type === '拍照打卡') document.getElementById('previewArea').classList.add('hidden');
            });
        };

        function loadRecords() {
            db.ref('attendance_records').limitToLast(100).on('value', snap => {
                let myH = ""; let allH = "";
                const list = []; snap.forEach(c => list.push(c.val()));
                list.reverse().forEach(r => {
                    const row = `<div class="p-3 border-b border-gray-50 flex justify-between text-[11px]">
                        <div><b>${r.type}</b><br><span class="text-gray-400">${r.time}</span></div>
                        <div class="text-blue-500 font-bold">${r.detail}</div>
                    </div>`;
                    if(r.user === user.acc) myH += row;
                    allH += `<div class="p-2 border-b"><b>${r.nick}</b>: ${r.type} [${r.detail}] (${r.time})</div>`;
                });
                document.getElementById('personalList').innerHTML = myH || "尚無紀錄";
                document.getElementById('adminFullList').innerHTML = allH;
            });
        }

        // 24H 時段生成
        const sel = document.getElementById('timeInput');
        for(let i=0; i<24; i++){
            let h = i < 10 ? '0'+i : i;
            let n = (i+1)%24; let nH = n < 10 ? '0'+n : n;
            let opt = document.createElement('option');
            opt.value = `${h}:00-${nH}:00`; opt.innerText = `${h}:00 - ${nH}:00`;
            sel.appendChild(opt);
        }

        // 時鐘與打卡時效 (58-03)
        setInterval(() => {
            const now = new Date();
            const min = now.getMinutes();
            document.getElementById('liveClock').innerText = now.toTimeString().split(' ')[0];
            const isOk = (min >= 58 || min <= 3);
            const status = document.getElementById('checkinStatus');
            const btn = document.getElementById('checkBtn');
            if(isOk) {
                status.innerText = "● 打卡時段已開啟"; status.className = "mb-4 p-2 rounded-lg text-xs font-bold bg-green-50 text-green-600";
                btn.disabled = false; btn.className = "w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-lg";
            } else {
                status.innerText = "○ 非打卡時段 (58-03)"; status.className = "mb-4 p-2 rounded-lg text-xs font-bold bg-red-50 text-red-500";
                btn.disabled = true; btn.className = "w-full bg-gray-300 text-white py-4 rounded-xl font-bold cursor-not-allowed";
            }
        }, 1000);

        // 分頁切換
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(btn.dataset.target).classList.remove('hidden');
            };
        });

        // 預覽圖片
        document.getElementById('fileInput').onchange = function() {
            const r = new FileReader();
            r.onload = e => { 
                document.getElementById('imgPrev').src = e.target.result; 
                document.getElementById('previewArea').classList.remove('hidden'); 
            };
            r.readAsDataURL(this.files[0]);
        };

        // 匯出 CSV
        document.getElementById('exportBtn').onclick = () => {
            let csv = "\uFEFF姓名,帳號,類型,時間,細節\n";
            db.ref('attendance_records').once('value', snap => {
                snap.forEach(c => { const r = c.val(); csv += `${r.nick},${r.user},${r.type},${r.time},${r.detail}\n`; });
                const blob = new Blob([csv], { type: 'text/csv; charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `岳笙報表.csv`; a.click();
            });
        };
    </script>
</body>
</html>
